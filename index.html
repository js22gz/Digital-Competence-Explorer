<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DigComp 3.0 Explorer</title>
    <meta name="description" content="Digital Competence Framework visualization">
    <meta name="theme-color" content="#0f172a">
    
    <!-- PWA Manifest -->
    <link rel="manifest" href="/manifest.json">

    <style>
        :root {
            --bg: #0f172a;
            --card-bg: #1e293b;
            --text: #f8fafc;
            --text-muted: #94a3b8;
            --accent-1: #fbbf24; /* Area 1: Yellow */
            --accent-2: #3b82f6; /* Area 2: Blue */
            --accent-3: #f97316; /* Area 3: Orange */
            --accent-4: #22c55e; /* Area 4: Green */
            --accent-5: #ef4444; /* Area 5: Red */
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden;
        }

        main {
            flex: 1;
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
            padding: 2rem;
        }

        /* Competence Wheel Styles */
        .wheel-container {
            position: relative;
            width: 550px;
            height: 550px;
            max-width: 95vw;
            max-height: 95vw;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        svg#competence-wheel {
            width: 100%;
            height: 100%;
            filter: drop-shadow(0 0 30px rgba(0,0,0,0.6));
            overflow: visible;
        }

        .segment {
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            stroke: var(--bg);
            stroke-width: 4;
            paint-order: stroke;
        }

        .segment:hover {
            filter: brightness(1.2);
            transform: scale(1.05);
            transform-origin: 250px 250px;
        }

        .segment.active {
            filter: brightness(1.3);
            stroke: white;
            stroke-width: 4;
        }

        .segment-label {
            fill: white;
            font-weight: 800;
            font-size: 24px;
            text-anchor: middle;
            pointer-events: none;
            text-shadow: 0 2px 4px rgba(0,0,0,0.5);
        }

        .center-circle {
            fill: var(--bg);
            stroke: rgba(255,255,255,0.1);
            stroke-width: 1;
            pointer-events: all;
            cursor: pointer;
        }

        .center-circle:hover {
            fill: rgba(255,255,255,0.05);
        }

        .center-text {
            fill: white;
            font-weight: bold;
            font-size: 21px;
            text-anchor: middle;
            pointer-events: none;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* Details Area */
        #details-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(15, 23, 42, 0.9);
            backdrop-filter: blur(8px);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 100;
            padding: 2rem;
        }

        #details-card {
            background: var(--card-bg);
            width: 100%;
            max-width: 700px;
            max-height: 85vh;
            border-radius: 24px;
            padding: 2.5rem;
            position: relative;
            overflow-y: auto;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255,255,255,0.1);
            transform: translateY(20px);
            opacity: 0;
            transition: all 0.4s ease;
        }

        #details-card.visible {
            transform: translateY(0);
            opacity: 1;
        }

        .close-btn {
            position: absolute;
            top: 1.5rem;
            right: 1.5rem;
            background: rgba(255,255,255,0.1);
            border: none;
            color: white;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            transition: background 0.2s;
        }

        .close-btn:hover {
            background: rgba(255,255,255,0.2);
        }

        .area-label {
            display: inline-block;
            padding: 0.25rem 0.75rem;
            border-radius: 9999px;
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
            margin-bottom: 1rem;
        }

        .area-title {
            font-size: 1.75rem;
            margin-bottom: 1rem;
            line-height: 1.2;
        }

        .area-desc {
            color: var(--text-muted);
            margin-bottom: 2rem;
            line-height: 1.6;
        }

        .competence-list {
            display: grid;
            gap: 1.5rem;
        }

        .competence-item {
            background: rgba(255,255,255,0.03);
            padding: 1.5rem;
            border-radius: 20px;
            border-left: 4px solid transparent;
            transition: transform 0.2s;
        }

        .competence-item:hover {
            background: rgba(255,255,255,0.05);
        }

        .comp-id {
            font-weight: 800;
            font-size: 0.9rem;
            margin-bottom: 0.25rem;
            opacity: 0.8;
        }

        .comp-title {
            font-weight: 700;
            font-size: 1.25rem;
            margin-bottom: 0.75rem;
        }

        .comp-desc {
            font-size: 1rem;
            color: var(--text-muted);
            line-height: 1.5;
            margin-bottom: 1.5rem;
        }

        /* Proficiency Levels Grid */
        .levels-toggle-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0.75rem 1rem;
            background: rgba(255,255,255,0.05);
            border-radius: 12px;
            cursor: pointer;
            margin-top: 1.5rem;
            font-weight: 700;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--text);
            transition: all 0.2s;
            border: 1px solid rgba(255,255,255,0.05);
        }

        .levels-toggle-header:hover {
            background: rgba(255,255,255,0.1);
        }

        .levels-container {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.5s cubic-bezier(0, 1, 0, 1);
            display: flex;
            flex-direction: column;
            gap: 1rem;
            margin-top: 0;
        }

        .levels-container.open {
            max-height: 5000px;
            transition: max-height 0.5s ease-in;
            margin-top: 1rem;
        }

        .levels-toggle-header .chevron {
            transition: transform 0.3s ease;
            opacity: 0.5;
        }

        .levels-toggle-header.open .chevron {
            transform: rotate(180deg);
        }

        .level-card {
            background: rgba(0,0,0,0.2);
            border-radius: 16px;
            border: 1px solid rgba(255,255,255,0.05);
            overflow: hidden;
            transition: all 0.3s ease;
        }

        .level-header {
            padding: 1.25rem;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            user-select: none;
            transition: background 0.2s;
        }

        .level-header:hover {
            background: rgba(255,255,255,0.03);
        }

        .level-name {
            font-weight: 700;
            text-transform: uppercase;
            font-size: 0.8rem;
            letter-spacing: 0.05em;
            display: flex;
            align-items: center;
            gap: 0.75rem;
            margin-bottom: 0; /* Override previous */
        }

        .level-name::before {
            content: '';
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: currentColor;
        }

        .chevron {
            transition: transform 0.3s ease;
            opacity: 0.5;
        }

        .level-card.open .chevron {
            transform: rotate(180deg);
        }

        .level-content {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.4s cubic-bezier(0, 1, 0, 1);
            padding: 0 1.25rem;
        }

        .level-card.open .level-content {
            max-height: 1000px;
            transition: max-height 0.4s ease-in;
            padding: 0 1.25rem 1.25rem 1.25rem;
        }

        .level-desc {
            color: var(--text-muted);
            margin-bottom: 1rem;
            font-style: italic;
            font-size: 0.9rem;
            line-height: 1.5;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            padding-bottom: 1rem;
        }

        .outcomes-list {
            list-style: none;
        }

        .outcome-item {
            position: relative;
            padding-left: 1.25rem;
            margin-bottom: 0.4rem;
            line-height: 1.4;
            color: var(--text);
        }

        .outcome-item::before {
            content: '→';
            position: absolute;
            left: 0;
            opacity: 0.5;
        }

        .ai-label {
            font-size: 0.65rem;
            font-weight: 800;
            padding: 1px 4px;
            border-radius: 4px;
            background: rgba(255,255,255,0.1);
            margin-left: 4px;
            vertical-align: middle;
        }

        footer {
            padding: 2rem;
            color: var(--text-muted);
            font-size: 0.8rem;
            text-align: center;
        }

        @media (max-width: 600px) {
            #details-card { padding: 1.5rem; }
            .area-title { font-size: 1.4rem; }
        }
    </style>
</head>

        let currentLang = 'en';

        function t(key) {

        }

        function changeLanguage(lang) {
            if (TRANSLATIONS[lang]) {
                currentLang = lang;
                updateUI();
            }
        }

        function updateUI() {
            const ui = TRANSLATIONS[currentLang].ui;
            
            const footer = document.querySelector('footer');
            footer.innerHTML = `<p>${ui.footer}</p><p>${ui.vanilla} (v1.1)</p>`;

            // Update language switch text
            const langText = document.getElementById('lang-switch-text');
            if (langText) {
                langText.textContent = currentLang === 'en' ? 'EN / SV' : 'SV / EN';
            }

            // Redraw wheel to update labels if needed
            const svg = document.getElementById('competence-wheel');
            // Clear segments and labels but keep center circle/text
            const segments = svg.querySelectorAll('.segment, .segment-label');
            segments.forEach(s => s.remove());
            createWheel();

            // Ensure center content stays on top
            const centerContent = document.getElementById('center-content');
            if (centerContent) {
                svg.appendChild(centerContent);
            }
        }

        function toggleLanguage() {
            const nextLang = currentLang === 'en' ? 'sv' : 'en';
            changeLanguage(nextLang);
        }

        function createWheel() {
            const svg = document.getElementById('competence-wheel');
            const centerX = 250;
            const centerY = 250;
            const outerRadius = 220;
            const innerRadius = 100;
            const data = TRANSLATIONS[currentLang].data;
            const numSegments = data.length;
            const angleStep = (2 * Math.PI) / numSegments;

            data.forEach((area, i) => {
                const startAngle = i * angleStep - Math.PI / 2;
                const endAngle = (i + 1) * angleStep - Math.PI / 2;

                const x1 = centerX + outerRadius * Math.cos(startAngle);
                const y1 = centerY + outerRadius * Math.sin(startAngle);
                const x2 = centerX + outerRadius * Math.cos(endAngle);
                const y2 = centerY + outerRadius * Math.sin(endAngle);

                const x3 = centerX + innerRadius * Math.cos(endAngle);
                const y3 = centerY + innerRadius * Math.sin(endAngle);
                const x4 = centerX + innerRadius * Math.cos(startAngle);
                const y4 = centerY + innerRadius * Math.sin(startAngle);

                const pathData = `
                    M ${x1} ${y1}
                    A ${outerRadius} ${outerRadius} 0 0 1 ${x2} ${y2}
                    L ${x3} ${y3}
                    A ${innerRadius} ${innerRadius} 0 0 0 ${x4} ${y4}
                    Z
                `;

                const path = document.createElementNS("http://www.w3.org/2000/svg", "path");
                path.setAttribute("d", pathData);
                path.setAttribute("fill", area.color);
                path.classList.add("segment");
                path.id = `segment-${area.id}`;
                path.onclick = () => showDetails(area);

                // Add text label
                const labelAngle = startAngle + angleStep / 2;
                const labelRadius = (outerRadius + innerRadius) / 2;
                const lx = centerX + labelRadius * Math.cos(labelAngle);
                const ly = centerY + labelRadius * Math.sin(labelAngle);

                const text = document.createElementNS("http://www.w3.org/2000/svg", "text");
                text.setAttribute("x", lx);
                text.setAttribute("y", ly);
                text.classList.add("segment-label");
                
                // Wrap title into multiple lines
                const words = area.title.split(' ');
                let lines = [];
                let currentLine = "";
                words.forEach(word => {
                    if ((currentLine + word).length > 12) {
                        if (currentLine) lines.push(currentLine.trim());
                        currentLine = word + " ";
                    } else {
                        currentLine += word + " ";
                    }
                });
                if (currentLine) lines.push(currentLine.trim());

                let tspanHtml = `<tspan x="${lx}" dy="-${(lines.length - 1) * 9 + 7}">${area.id}</tspan>`;
                lines.forEach((line, index) => {
                    tspanHtml += `<tspan x="${lx}" dy="${index === 0 ? 27 : 15}" font-size="12" font-weight="400">${line}</tspan>`;
                });
                text.innerHTML = tspanHtml;

                svg.appendChild(path);
                svg.appendChild(text);
            });
        }

        function showDetails(area) {
            const overlay = document.getElementById('details-overlay');
            const card = document.getElementById('details-card');
            const content = document.getElementById('card-content');
            const ui = TRANSLATIONS[currentLang].ui;

            // Set active segment
            document.querySelectorAll('.segment').forEach(s => s.classList.remove('active'));
            document.getElementById(`segment-${area.id}`).classList.add('active');

            content.innerHTML = `
                <span class="area-label" style="background: ${area.color}; color: ${getContrastColor(area.color)}">${ui.area} ${area.id}</span>
                <h2 class="area-title">${area.title}</h2>

                <div class="competence-list">

                            <h3 class="comp-title">${comp.title}</h3>

                            <div class="levels-toggle-header" onclick="toggleLevelsContainer('levels-${area.id}-${compIdx}', this)">
                                <span>${ui.levels_label}</span>
                                <span class="chevron">▼</span>
                            </div>
                            <div class="levels-container" id="levels-${area.id}-${compIdx}">
                                ${comp.levels.map((level, levelIdx) => {
                                    const levelId = `level-${area.id}-${compIdx}-${levelIdx}`;
                                    return `
                                    <div class="level-card" id="${levelId}">
                                        <div class="level-header" onclick="toggleLevel('${levelId}')">
                                            <div class="level-name" style="color: ${area.color}">${level.name}</div>
                                            <span class="chevron">▼</span>
                                        </div>
                                        <div class="level-content">
                                            <div class="level-desc">${level.desc}</div>
                                            <ul class="outcomes-list">
                                                ${level.outcomes.map(outcome => {
                                                    const hasAI = outcome.includes('[AI-');
                                                    const cleanOutcome = outcome.replace(/\[AI-([EI])\]/g, '');
                                                    const aiType = outcome.match(/\[AI-([EI])\]/)?.[1];
                                                    return `
                                                        <li class="outcome-item">
                                                            ${cleanOutcome}
                                                            ${hasAI ? `<span class="ai-label">AI-${aiType}</span>` : ''}
                                                        </li>
                                                    `;
                                                }).join('')}
                                            </ul>
                                        </div>
                                    </div>
                                `;}).join('')}
                            </div>
                        </div>
                    `).join('')}
                </div>
            `;

            overlay.style.display = 'flex';
            setTimeout(() => card.classList.add('visible'), 10);
        }

        function toggleLevel(id) {
            const card = document.getElementById(id);
            card.classList.toggle('open');
        }

        function toggleLevelsContainer(id, header) {
            const container = document.getElementById(id);
            container.classList.toggle('open');
            header.classList.toggle('open');
        }

        function closeDetails() {
            const overlay = document.getElementById('details-overlay');
            const card = document.getElementById('details-card');
            
            card.classList.remove('visible');
            document.querySelectorAll('.segment').forEach(s => s.classList.remove('active'));
            
            setTimeout(() => {
                overlay.style.display = 'none';
            }, 400);
        }

        function getContrastColor(hex) {
            const r = parseInt(hex.slice(1, 3), 16);
            const g = parseInt(hex.slice(3, 5), 16);
            const b = parseInt(hex.slice(5, 7), 16);
            const yiq = ((r * 299) + (g * 587) + (b * 114)) / 1000;
            return (yiq >= 128) ? 'black' : 'white';
        }

        // Initialize
        window.onload = () => {
            createWheel();
            
            // Register Service Worker
            if ('serviceWorker' in navigator) {
                navigator.serviceWorker.register('/sw.js').then((reg) => {
                    reg.onupdatefound = () => {
                        const installingWorker = reg.installing;
                        installingWorker.onstatechange = () => {
                            if (installingWorker.state === 'installed' && navigator.serviceWorker.controller) {
                                window.location.reload();
                            }
                        };
                    };
                }).catch(console.error);
            }
        };

        // Close on overlay click
        document.getElementById('details-overlay').onclick = (e) => {
            if (e.target.id === 'details-overlay') closeDetails();
        };
    </script>
</body>
</html>
