<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DigComp - tabell</title>
    <style>
        /* Reset and Base Styles */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
            background-color: #0f172a; 
            color: #f8fafc;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* App Bar */
        .app-bar {
            display: flex;
            align-items: center;
            padding: 8px 16px;
            border-bottom: 1px solid #334155;
            background: #1e293b;
            flex-shrink: 0;
        }
        .back-btn {
            color: #3b82f6;
            text-decoration: none;
            font-size: 14px;
            font-weight: 500;
            margin-right: 16px;
            padding: 6px 10px;
            border-radius: 4px;
        }
        .back-btn:hover { background: #334155; }
        .app-title { font-size: 18px; color: #94a3b8; }

        /* Settings Panel */
        .settings-toggle {
            background: #1e293b;
            border-bottom: 1px solid #334155;
            padding: 10px 16px;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 13px;
            font-weight: 500;
            user-select: none;
            color: #94a3b8;
        }
        .settings-panel {
            background: #0f172a;
            border-bottom: 1px solid #334155;
            padding: 20px;
            display: none;
            flex-direction: column;
            gap: 24px;
        }
        .settings-panel.open { display: flex; }

        .settings-grid {
            display: flex;
            flex-direction: column;
            gap: 24px;
        }

        .filter-group { 
            display: flex; 
            flex-direction: column; 
            gap: 12px; 
            width: 100%;
        }
        .filter-label { 
            font-size: 11px; 
            font-weight: 700; 
            color: #94a3b8; 
            text-transform: uppercase; 
            letter-spacing: 0.05em;
            border-bottom: 1px solid #334155;
            padding-bottom: 6px;
            margin-bottom: 4px;
        }
        
        .search-container {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
            border: 1px solid #334155;
            border-radius: 4px;
            padding: 8px 12px;
            font-size: 14px;
            width: 300px;
            outline: none;
            background: #1e293b;
            color: #f8fafc;
        }
        .search-input:focus { border-color: #3b82f6; box-shadow: 0 0 0 2px rgba(59,130,246,0.2); }

        .checkbox-grid { 
            display: flex; 
            flex-wrap: wrap;
            gap: 16px; 
        }
        .checkbox-item { 
            display: flex; 
            align-items: center; 
            gap: 8px; 
            font-size: 13px; 
            cursor: pointer; 
            color: #f8fafc;
            padding: 4px 0;
            transition: color 0.2s;
            white-space: nowrap;
        }
        .checkbox-item:hover { color: #3b82f6; }
        .checkbox-item input { 
            cursor: pointer; 
            width: 16px;
            height: 16px;
            accent-color: #3b82f6;
        }

        /* Table Styles */
        .table-container {
            flex-grow: 1;
            overflow: auto;
            position: relative;
            background: #0f172a;
        }
        table {
            width: 100%;
            border-collapse: separate;
            border-spacing: 0;
            table-layout: fixed;
        }
        thead th {
            position: sticky;
            top: 0;
            background: #1e293b;
            z-index: 10;
            border-bottom: 2px solid #334155;
            border-right: 1px solid #334155;
            padding: 10px 12px;
            text-align: left;
            font-size: 12px;
            font-weight: 500;
            color: #94a3b8;
        }
        td {
            border-bottom: 1px solid #334155;
            border-right: 1px solid #334155;
            padding: 10px 12px;
            font-size: 13px;
            vertical-align: top;
            line-height: 1.5;
            color: #f8fafc;
        }
        tr:hover td { background-color: #1e293b; }

        /* Column Widths */
        .col-area { width: 100px; }
        .col-comp { width: 220px; }
        .col-level { width: 140px; }
        .col-desc { width: auto; }

        /* Content Tags */
        .area-tag {
            background: #334155;
            color: #3b82f6;
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 11px;
            font-weight: 500;
        }
        .level-badge { font-weight: 600; font-size: 11px; text-transform: uppercase; }
        .level-basic { color: #4ade80; }
        .level-intermediate { color: #fbbf24; }
        .level-advanced { color: #f87171; }
        .level-highly { color: #c084fc; }
        
        .outcomes-list { margin: 8px 0 0 18px; }
        .outcomes-list li { margin-bottom: 4px; }
        
        .ai-tag {
            background: #334155;
            color: #94a3b8;
            font-size: 10px;
            font-weight: 700;
            padding: 1px 4px;
            border-radius: 3px;
            margin-left: 4px;
        }

        #no-results {
            padding: 40px;
            text-align: center;
            color: #94a3b8;
            display: none;
        }
    </style>
</head>
<body>

    <div class="app-bar">
        <a href="index.html" class="back-btn">← App</a>
        <div class="app-title">DigComp - tabell</div>
    </div>

    <div class="settings-toggle" onclick="toggleSettings()">
        <span>FILTER & INSTÄLLNINGAR</span>
        <span id="toggle-icon">▼</span>

    <div id="settings-panel" class="settings-panel">
        <div class="settings-grid">
            <!-- Column 1: Search & AI -->
            <div class="filter-group search-container">
                <div>
                    <label class="filter-label">Fritextsökning</label>
                    <input type="text" id="search-input" class="search-input" style="width: 100%;" placeholder="Sök i kompetenser eller resultat...">
                </div>
                <div style="margin-top: 8px;">
                    <label class="filter-label">Specialfilter</label>
                    <label class="checkbox-item">
                        <input type="checkbox" id="ai-only"> Endast AI-relaterat
                    </label>
                </div>
            </div>

            <!-- Column 2: Areas -->
            <div class="filter-group">
                <label class="filter-label">Visa Områden</label>
                <div class="checkbox-grid">
                    <label class="checkbox-item"><input type="checkbox" class="area-checkbox" value="1" checked> 1. Informationssökning, utvärdering och hantering</label>
                    <label class="checkbox-item"><input type="checkbox" class="area-checkbox" value="2" checked> 2. Kommunikation och samarbete</label>
                    <label class="checkbox-item"><input type="checkbox" class="area-checkbox" value="3" checked> 3. Digitalt skapande</label>
                    <label class="checkbox-item"><input type="checkbox" class="area-checkbox" value="4" checked> 4. Säkerhet, välbefinnande och ansvarsfullt användande</label>
                    <label class="checkbox-item"><input type="checkbox" class="area-checkbox" value="5" checked> 5. Problemidentifiering och problemlösning</label>
                </div>
            </div>

            <!-- Column 3: Levels -->
            <div class="filter-group">
                <label class="filter-label">Visa Nivåer</label>
                <div class="checkbox-grid">
                    <label class="checkbox-item"><input type="checkbox" class="level-checkbox" value="Grundläggande" checked> Grundläggande</label>
                    <label class="checkbox-item"><input type="checkbox" class="level-checkbox" value="Mellanliggande" checked> Mellanliggande</label>
                    <label class="checkbox-item"><input type="checkbox" class="level-checkbox" value="Avancerad" checked> Avancerad</label>
                    <label class="checkbox-item"><input type="checkbox" class="level-checkbox" value="Mycket avancerad" checked> Mycket avancerad</label>
                    <label class="checkbox-item"><input type="checkbox" class="level-checkbox" value="Allmänt" checked> Allmänt</label>
                </div>
            </div>
        </div>
    </div>

    <div class="table-container">
        <table>
            <thead>
                <tr>
                    <th class="col-area">Område</th>
                    <th class="col-comp">Kompetens</th>
                    <th class="col-level">Nivå</th>
                    <th class="col-desc">Beskrivning & Läranderesultat</th>
                </tr>
            </thead>
            <tbody id="table-body"></tbody>
        </table>
        <div id="no-results">Inga resultat matchar valda filter.</div>
    </div>

                    },
                    { id: "4.2", title: "Skydda personuppgifter och integritet", levels: [{name: "Allmänt", desc: "Täcker alla färdighetsnivåer", outcomes: ["Identifiera risker med att dela personuppgifter i digitala miljöer, inklusive specifika risker i relation till AI-system. [AI-E]", "Beskriva integritetskonsekvenser förknippade med användning av delat onlineinnehåll, till exempel för att träna AI-system. [AI-E]", "Leda eller bidra till utformningen av strategier för skydd av personuppgifter i digitala sammanhang. [AI-I]"]}] },

                    { id: "5.3", title: "Identifiera kreativa lösningar med hjälp av digital teknik", levels: [{name: "Allmänt", desc: "Täcker alla färdighetsnivåer", outcomes: ["Känna igen att digital teknik kan stödja, men inte ersätta, mänsklig kreativitet. [AI-I]", "Beskriva styrkor, svagheter och etiska överväganden för digital teknik inklusive AI-system i relation till mänsklig kreativitet. [AI-E]", "Leda eller bidra till initiativ fokuserade på tillämpning av digital teknik för mycket komplex eller specialiserad problemlösning. [AI-I]"]}] },
                    { id: "5.4", title: "Identifiera och hantera behov av digital kompetens", levels: [{name: "Allmänt", desc: "Täcker alla färdighetsnivåer", outcomes: ["Erkänna värdet av att utveckla sin digitala kompetens och fördelarna med att söka stöd för att hantera behov av digital kompetens. [AI-I]", "Noggrant bedöma sina egna digitala kompetenser och behov av digital kompetens. [AI-I]", "Designa läromedel för att hjälpa andra att möta komplexa eller specialiserade behov av digital kompetens. [AI-I]"]}] }
                ]
            }
        ];

        // Flatten data
        const flattenedData = [];
        rawData.forEach(area => {
            area.competences.forEach(comp => {
                comp.levels.forEach(level => {
                    flattenedData.push({
                        areaId: area.id,
                        areaTitle: area.title,
                        compId: comp.id,
                        compTitle: comp.title,
                        levelName: level.name,
                        levelDesc: level.desc,
                        outcomes: level.outcomes
                    });
                });
            });
        });

        const tableBody = document.getElementById('table-body');
        const searchInput = document.getElementById('search-input');
        const aiOnlyCheckbox = document.getElementById('ai-only');
        const areaCheckboxes = document.querySelectorAll('.area-checkbox');
        const levelCheckboxes = document.querySelectorAll('.level-checkbox');
        const noResults = document.getElementById('no-results');

        function toggleSettings() {
            const panel = document.getElementById('settings-panel');
            const icon = document.getElementById('toggle-icon');
            const isOpen = panel.classList.toggle('open');
            icon.textContent = isOpen ? '▲' : '▼';
        }

        function renderTable() {
            const searchTerm = searchInput.value.toLowerCase();
            const aiOnly = aiOnlyCheckbox.checked;
            const selectedAreas = Array.from(areaCheckboxes)
                .filter(cb => cb.checked)
                .map(cb => parseInt(cb.value));
            const selectedLevels = Array.from(levelCheckboxes)
                .filter(cb => cb.checked)
                .map(cb => cb.value);

            const filtered = flattenedData.filter(row => {
                const matchesSearch = 
                    row.areaTitle.toLowerCase().includes(searchTerm) ||
                    row.compTitle.toLowerCase().includes(searchTerm) ||
                    row.levelDesc.toLowerCase().includes(searchTerm) ||
                    row.outcomes.some(o => o.toLowerCase().includes(searchTerm));
                
                const matchesArea = selectedAreas.includes(row.areaId);
                const matchesLevel = selectedLevels.includes(row.levelName);
                const matchesAI = !aiOnly || row.outcomes.some(o => o.includes('[AI-'));

                return matchesSearch && matchesArea && matchesLevel && matchesAI;
            });

            tableBody.innerHTML = '';
            
            if (filtered.length === 0) {
                noResults.style.display = 'block';
                return;
            }
            noResults.style.display = 'none';

            filtered.forEach(row => {
                const tr = document.createElement('tr');
                const levelClass = row.levelName === 'Grundläggande' ? 'level-basic' : 
                                 row.levelName === 'Mellanliggande' ? 'level-intermediate' :
                                 row.levelName === 'Avancerad' ? 'level-advanced' :
                                 row.levelName === 'Mycket avancerad' ? 'level-highly' : '';

                const processedOutcomes = row.outcomes.map(o => {
                    return o.replace(/\[AI-(E|I)\]/g, '<span class="ai-tag">AI-$1</span>');
                });

                tr.innerHTML = `
                    <td><span class="area-tag">Område ${row.areaId}</span></td>
                    <td><strong>${row.compId}</strong> ${row.compTitle}</td>
                    <td><span class="level-badge ${levelClass}">${row.levelName}</span></td>
                    <td>
                        <div style="color: #70757a; margin-bottom: 6px; font-style: italic; font-size: 12px;">${row.levelDesc}</div>
                        <ul class="outcomes-list">
                            ${processedOutcomes.map(o => `<li>${o}</li>`).join('')}
                        </ul>
                    </td>
                `;
                tableBody.appendChild(tr);
            });
        }

        // Listeners
        searchInput.addEventListener('input', renderTable);
        aiOnlyCheckbox.addEventListener('change', renderTable);
        areaCheckboxes.forEach(cb => cb.addEventListener('change', renderTable));
        levelCheckboxes.forEach(cb => cb.addEventListener('change', renderTable));

        // Start
        renderTable();
    </script>
